server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

spring:
  application:
    name : auth-service

  datasource:
    url : ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ridr}
    username : ${SPRING_DATASOURCE_USERNAME:user}
    password : ${SPRING_DATASOURCE_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    jwt:
      # Must be at least 32 chars for HS256
      secret: ${JWT_SECRET:change-me-change-me-change-me-123456}
      # Access token lifetime: 1 hour
      expirationMs: ${JWT_EXPIRATION_MS:3600000}
      # Refresh token lifetime: 30 days
      refreshExpirationMs: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
