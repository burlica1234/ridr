server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive

  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: reporting-service
          uri: ${REPORTING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/reports/**

        - id: vehicle-service
          uri: ${VEHICLE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/vehicles/**

        - id: routing-service
          uri: ${ROUTING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/routes/**

        - id: rider-service
          uri: ${RIDER_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/riders/**

        - id: map-intelligence-service
          uri: ${MAP_INTELLIGENCE_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/maps/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true